name: release

# Build the desktop app on macOS + Windows and publish the installers (plus the
# electron-updater metadata) to the GitHub Release for the pushed tag.
# Trigger: push a tag like v0.1.1 (match package.json "version"), or run manually.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: "--mac"
          # Pin to windows-2022 (VS 2022 / v17). windows-latest ships VS 18 (2026),
          # which node-gyp can't detect ("unknown version") → native build fails.
          - os: windows-2022
            target: "--win"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # node-gyp (rebuilding better-sqlite3 for Node + Electron) needs distutils,
      # which was removed from Python 3.12. Pin 3.11 so the native build works.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # better-sqlite3 has no Windows prebuilt, so it compiles from source. The
      # node-gyp it would otherwise use (9.x) can't find VS 2022 on the runner —
      # an npm `override` (package.json) forces node-gyp >=10, which can.
      - name: Install deps
        run: npm ci
        env:
          npm_config_msvs_version: "2022"

      - name: Build (server + web)
        run: npm run build

      - name: Build & publish installer
        run: npx --no-install electron-builder ${{ matrix.target }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          npm_config_msvs_version: "2022"
          # No Apple Developer ID (mac.identity: null) — don't hunt for a cert.
          # The afterPack hook (scripts/afterPack.cjs) ad-hoc-signs the .app so the
          # bundle is sealed; without that, electron-builder ships an unsealed app
          # that Gatekeeper reports as "damaged". Users still clear the download
          # quarantine once (xattr -dr com.apple.quarantine) until we notarize.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

  # electron-builder uploads to a DRAFT release; flip it to published once both
  # platforms have uploaded, so electron-updater clients can see it.
  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace("refs/tags/", "");
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const draft = releases.find((r) => r.tag_name === tag && r.draft);
            if (!draft) {
              core.info(`No draft release found for ${tag}; nothing to publish.`);
              return;
            }
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: draft.id,
              draft: false,
            });
            core.info(`Published ${tag}.`);
